name: OOM Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, windows, x64]

    steps:
      - name: Show environment
        shell: powershell
        run: |
          wsl bash -lc "uname -a && cd ~/src/oom-build-tools && pwd"

      - name: Pull latest scripts repo
        shell: powershell
        run: |
          wsl bash -lc "cd ~/src/oom-build-tools && git pull --ff-only"

      - name: Run OOM Android build
        shell: powershell
        run: |
          wsl bash -lc "cd ~/src/oom-build-tools && ~/src/scripts/oom-run.sh"
