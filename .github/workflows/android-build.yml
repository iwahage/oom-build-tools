name: OOM Android Build

on:
  workflow_dispatch:
    inputs:
      mapper_ref:
        description: 'Mapper branch or tag to build'
        required: true
        default: 'main'
        type: string

jobs:
  build:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Prepare artifact folder
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path C:\actions-artifacts\current | Out-Null
          Remove-Item -Force C:\actions-artifacts\current\* -ErrorAction SilentlyContinue

      - name: Set build metadata
        shell: powershell
        run: |
          $stamp = Get-Date -Format "yyyyMMdd-HHmmss"
          $shortSha = $env:GITHUB_SHA.Substring(0,7)
          "BUILD_STAMP=$stamp" >> $env:GITHUB_ENV
          "SHORT_SHA=$shortSha" >> $env:GITHUB_ENV
          "MAPPER_REF=${{ inputs.mapper_ref }}" >> $env:GITHUB_ENV
          "APK_NAME=OOM-Android-${{ inputs.mapper_ref }}-$stamp-$shortSha.apk" >> $env:GITHUB_ENV
          "LOG_NAME=OOM-Android-${{ inputs.mapper_ref }}-$stamp-$shortSha-build.log" >> $env:GITHUB_ENV

      - name: Show environment
        shell: powershell
        run: |
          wsl.exe -d Ubuntu --exec /usr/bin/env -i HOME=/home/yutaro USER=yutaro PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin /bin/bash --noprofile --norc -c "uname -a && whoami && pwd"

      - name: Pull latest build-tools repo
        shell: powershell
        run: |
          wsl.exe -d Ubuntu --exec /usr/bin/env -i HOME=/home/yutaro USER=yutaro PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin /bin/bash --noprofile --norc -c "cd ~/src/oom-build-tools && git pull --ff-only"

      - name: Checkout Mapper branch
        shell: powershell
        run: |
          $targetRef = "${{ inputs.mapper_ref }}"
          $cmd = 'set -eu; MAPPER_REPO=~/src/mapper; TARGET_REF="' + $targetRef + '"; cd "$MAPPER_REPO"; git fetch origin --prune; if git show-ref --verify --quiet "refs/heads/$TARGET_REF"; then git checkout "$TARGET_REF"; git pull --ff-only origin "$TARGET_REF"; else git checkout -B "$TARGET_REF" "origin/$TARGET_REF"; fi; git rev-parse --abbrev-ref HEAD; git rev-parse --short HEAD'
          wsl.exe -d Ubuntu --exec /usr/bin/env -i HOME=/home/yutaro USER=yutaro PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin /bin/bash --noprofile --norc -c $cmd

      - name: Run OOM Android build
        shell: powershell
        run: |
          wsl.exe -d Ubuntu --exec /usr/bin/env -i HOME=/home/yutaro USER=yutaro PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin /bin/bash --noprofile --norc -c "cd ~/src/oom-build-tools && ./oom-run.sh > /mnt/c/actions-artifacts/current/build.log 2>&1"

      - name: Rename build log
        if: ${{ always() }}
        shell: powershell
        run: |
          if (Test-Path C:\actions-artifacts\current\build.log) {
            Rename-Item -Path C:\actions-artifacts\current\build.log -NewName $env:LOG_NAME -Force
          }

      - name: Copy unsigned APK to artifact folder
        if: ${{ success() }}
        shell: powershell
        run: |
          $unsigned = "/home/yutaro/src/superbuild/build-android/aarch64-linux-android/openorienteering-mapper-git-master/OpenOrienteering-Mapper-git-master-Android-arm64-v8a.apk"
          wsl.exe -d Ubuntu --exec /usr/bin/env -i HOME=/home/yutaro USER=yutaro PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin /bin/bash --noprofile --norc -c "cp -f $unsigned /mnt/c/actions-artifacts/current/$env:APK_NAME"

      - name: Sign APK with debug keystore
        if: ${{ success() }}
        shell: powershell
        run: |
          $apkPath = "C:\actions-artifacts\current\$env:APK_NAME"
          $debugKeystore = Join-Path $env:USERPROFILE ".android\debug.keystore"

          if (-not (Test-Path $apkPath)) { throw "APK not found: $apkPath" }
          if (-not (Test-Path $debugKeystore)) { throw "debug.keystore not found: $debugKeystore" }

          $buildToolsRoot = Join-Path $env:LOCALAPPDATA "Android\Sdk\build-tools"
          $apksigner = Get-ChildItem $buildToolsRoot -Directory |
            Sort-Object Name -Descending |
            ForEach-Object { Join-Path $_.FullName "apksigner.bat" } |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1

          $env:JAVA_HOME = "C:\Program Files\Android\Android Studio\jbr"
          $env:PATH = "$env:JAVA_HOME\bin;$env:PATH"

          & $apksigner sign `
            --ks $debugKeystore `
            --ks-key-alias androiddebugkey `
            --ks-pass pass:android `
            --key-pass pass:android `
            --v1-signing-enabled true `
            --v2-signing-enabled true `
            --v3-signing-enabled true `
            $apkPath

      - name: Verify APK signature
        if: ${{ success() }}
        shell: powershell
        run: |
          $apkPath = "C:\actions-artifacts\current\$env:APK_NAME"
          $buildToolsRoot = Join-Path $env:LOCALAPPDATA "Android\Sdk\build-tools"
          $apksigner = Get-ChildItem $buildToolsRoot -Directory |
            Sort-Object Name -Descending |
            ForEach-Object { Join-Path $_.FullName "apksigner.bat" } |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1

          $env:JAVA_HOME = "C:\Program Files\Android\Android Studio\jbr"
          $env:PATH = "$env:JAVA_HOME\bin;$env:PATH"

          & $apksigner verify --verbose $apkPath

      - name: Upload APK and log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: oom-android-apk-${{ inputs.mapper_ref }}-${{ env.BUILD_STAMP }}-${{ env.SHORT_SHA }}
          path: |
            C:\actions-artifacts\current\*.apk
            C:\actions-artifacts\current\*.log
          if-no-files-found: warn
          retention-days: 14
